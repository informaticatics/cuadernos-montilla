<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recopilatorio de cuadernos</title>
  <style>
    :root {
      --bg: #f4f7f9;
      --surface: #ffffff;
      --primary: #004a99;
      --primary-2: #0b66c3;
      --text: #24323f;
      --muted: #6b7a88;
      --border: #dbe4ec;
      --cat: #3498db;
      --conf: #e74c3c;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 980px; margin: 0 auto; padding: 24px; }
    .header-master { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; padding: 32px 24px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 24px; }
    .header-master h1 { margin: 0 0 8px 0; font-size: 32px; }
    .header-master p { margin: 0; opacity: 0.92; }
    .grid { display: grid; gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: .03em; }
    .badge-cat { background: var(--cat); }
    .badge-conf { background: var(--conf); }
    h2 { margin: 0 0 12px 0; color: var(--primary); font-size: 24px; }
    p { margin: 0 0 18px 0; line-height: 1.6; }
    .btn { display: inline-block; background: var(--primary); color: white; text-decoration: none; padding: 12px 18px; border-radius: 10px; font-weight: 700; }
    .footer-card { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header-master">
      <h1>RECOPILATORIO DE CUADERNOS</h1>
      <p>Ayuntamiento de Montilla - Gestión de Fondos Europeos</p>
    </header>

    <main id="main-content" class="grid">
      
    <article class="card">
      <div class="meta">
        <span class="badge badge-cat">Análisis de Datos/Técnico</span>
        <span class="badge badge-conf">Público</span>
      </div>
      <h2>3</h2>
      <p>3</p>
      <a href="#" class="btn" target="_blank" rel="noopener noreferrer">ABRIR RECURSO</a>
      <div class="footer-card">Registrado el: 06/05/2026 09:18:21</div>
    </article>
  
<!-- NUEVOS_REGISTROS_AQUI -->
    </main>
  </div>
</body>
</html>
